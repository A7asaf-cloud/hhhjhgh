<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="פיננסי">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0b14">
<title>לוח בקרה פיננסי</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap">
<script async src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script async src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow-x:hidden}
body{font-family:'Rubik','Segoe UI',sans-serif;background:#0a0b14;min-height:100%;direction:rtl;color:#e2e8f0;-webkit-font-smoothing:antialiased;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom);overflow-x:hidden}
::-webkit-scrollbar{width:0;display:none}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(99,102,241,.12),transparent),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(244,114,182,.08),transparent),linear-gradient(160deg,#0a0b14,#111327 50%,#0a0b14);pointer-events:none}
.app{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:16px 14px;padding-bottom:90px}
.hidden{display:none!important}

/* Header */
.hdr{margin-bottom:20px}
.hdr h1{font-size:24px;font-weight:800;background:linear-gradient(135deg,#818cf8,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr .sub{color:#475569;font-size:12px;margin-top:4px}

/* Month scroller */
.mscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -14px 18px;padding:0 14px;scrollbar-width:none}
.mscroll::-webkit-scrollbar{display:none}
.mtabs{display:flex;gap:6px;width:max-content}
.mt{padding:8px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);color:#64748b;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.mt:active{transform:scale(.95)}
.mt.on{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(99,102,241,.4);font-weight:600}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,11,20,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-around;align-items:center;padding:8px 0;padding-bottom:calc(8px + env(safe-area-inset-bottom))}
.bni{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;border-radius:12px;cursor:pointer;transition:all .2s;border:none;background:transparent;font-family:inherit}
.bni:active{transform:scale(.9)}
.bni .bi{font-size:22px}
.bni .bl{font-size:10px;color:#475569;font-weight:500}
.bni.on .bl{color:#818cf8}
.bni.on{background:rgba(99,102,241,.1)}

/* Cards */
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
@media(max-width:380px){.cgrid{grid-template-columns:1fr}}
.sc{background:linear-gradient(145deg,rgba(22,24,40,.95),rgba(14,16,28,.98));border:1px solid rgba(255,255,255,.05);border-radius:18px;padding:16px;position:relative;overflow:hidden;transition:all .2s}
.sc:active{transform:scale(.97)}
.sc .bar{position:absolute;top:0;right:0;width:100%;height:3px;border-radius:18px 18px 0 0}
.sc .glow{position:absolute;top:-30px;left:-30px;width:70px;height:70px;border-radius:50%;opacity:.1;filter:blur(25px);pointer-events:none}
.sc .ico{font-size:24px;margin-bottom:8px;display:block}
.sc .lbl{color:#64748b;font-size:11px;margin-bottom:4px}
.sc .val{font-size:20px;font-weight:700;color:#f1f5f9;font-variant-numeric:tabular-nums}
@media(min-width:500px){.sc .val{font-size:24px}}
.sc .trnd{display:inline-flex;align-items:center;gap:3px;margin-top:6px;font-size:10px;padding:2px 8px;border-radius:16px;font-weight:500}
.tu{background:rgba(16,185,129,.12);color:#34d399}.td{background:rgba(239,68,68,.12);color:#f87171}

/* Panel */
.pnl{background:linear-gradient(145deg,rgba(22,24,40,.95),rgba(14,16,28,.98));border:1px solid rgba(255,255,255,.05);border-radius:18px;padding:18px;margin-bottom:14px}
.pnl h3{font-size:14px;font-weight:600;color:#94a3b8;margin-bottom:16px}
.chwrap{position:relative;height:220px;margin:0 -6px}
@media(min-width:500px){.chwrap{height:260px}}
.leg{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:12px}
.leg span{display:flex;align-items:center;gap:5px;font-size:11px;color:#64748b}
.ldot{width:8px;height:8px;border-radius:50%;display:inline-block}

/* Expense items */
.ei{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.ei:last-of-type{border-bottom:none}
.eic{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.einf{flex:1;min-width:0}
.einf .nm{font-size:13px;color:#e2e8f0;font-weight:500}
.einf .pc{font-size:10px;color:#475569;margin-top:2px}
.ebar{height:3px;background:rgba(255,255,255,.04);border-radius:3px;margin-top:4px;overflow:hidden}
.efill{height:100%;border-radius:3px;transition:width .5s}
.eamt{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0}
.totrow{display:flex;justify-content:space-between;align-items:center;padding-top:14px;margin-top:6px;border-top:1px solid rgba(255,255,255,.08)}
.sbox{margin-top:14px;padding:14px;border-radius:12px;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.12)}
.sbar{height:5px;background:rgba(255,255,255,.05);border-radius:5px;margin-top:8px;overflow:hidden}
.sfill{height:100%;border-radius:5px;background:linear-gradient(90deg,#10b981,#34d399)}

/* Goals */
.ggrid{display:grid;grid-template-columns:1fr;gap:0}
@media(min-width:600px){.ggrid{grid-template-columns:1fr 1fr;gap:0 32px}}
.gi{padding:14px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.ghdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.gnm{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.gamt{font-size:11px;color:#475569;font-variant-numeric:tabular-nums}
.gbar{height:10px;background:rgba(255,255,255,.04);border-radius:10px;overflow:hidden}
.gfill{height:100%;border-radius:10px;transition:width .8s}
.gpct{font-size:12px;font-weight:700;margin-top:4px}

/* Input styles */
.einput{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#e2e8f0;font-size:16px;font-family:inherit;text-align:center;font-variant-numeric:tabular-nums;transition:all .2s;direction:ltr;outline:none;-webkit-appearance:none}
.einput:focus{border-color:#6366f1;background:rgba(99,102,241,.08);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.einput.inc{color:#34d399}.einput.exp{color:#f87171}.einput.sav{color:#818cf8}

/* Wizard / Setup */
.wiz-overlay{position:fixed;inset:0;z-index:200;background:rgba(10,11,20,.98);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.wiz-box{width:100%;max-width:500px;text-align:center}
.wiz-box h2{font-size:22px;font-weight:700;margin-bottom:6px;color:#f1f5f9}
.wiz-box .wiz-sub{font-size:13px;color:#64748b;margin-bottom:28px}
.wiz-step{font-size:11px;color:#818cf8;margin-bottom:16px;font-weight:500}
.wiz-fields{display:grid;grid-template-columns:1fr;gap:14px;text-align:right;margin-bottom:24px}
.wiz-field{display:flex;flex-direction:column;gap:6px}
.wiz-field label{font-size:12px;color:#94a3b8;font-weight:500;display:flex;align-items:center;gap:6px}
.wiz-field input{width:100%;padding:14px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#e2e8f0;font-size:18px;font-family:inherit;text-align:center;direction:ltr;outline:none;-webkit-appearance:none;transition:all .2s}
.wiz-field input:focus{border-color:#6366f1;background:rgba(99,102,241,.06);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.wiz-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.btn-primary{width:100%;padding:16px;border-radius:14px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;box-shadow:0 4px 20px rgba(99,102,241,.35)}
.btn-primary:active{transform:scale(.97);box-shadow:0 2px 10px rgba(99,102,241,.2)}
.btn-primary:disabled{opacity:.4;cursor:default}
.btn-secondary{width:100%;padding:14px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:transparent;color:#94a3b8;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-secondary:active{background:rgba(255,255,255,.04)}
.btn-row{display:flex;gap:10px;margin-top:10px}
.btn-row .btn-secondary{flex:1}

/* Edit cards */
.ecard{background:rgba(255,255,255,.02);border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid rgba(255,255,255,.04)}
.ecard-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.ecard-month{font-size:15px;font-weight:600;color:#cbd5e1}
.ecard-net{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums}
.ecard-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ecard-field{display:flex;flex-direction:column;gap:4px}
.ecard-label{font-size:10px;color:#475569;font-weight:500;display:flex;align-items:center;gap:4px}
.ecard .einput{font-size:15px;padding:10px 12px}

.add-btn{width:100%;padding:14px;border-radius:14px;border:1px dashed rgba(255,255,255,.1);background:transparent;color:#64748b;font-size:14px;cursor:pointer;font-family:inherit;transition:all .25s;display:flex;align-items:center;justify-content:center;gap:8px}
.add-btn:active{border-color:#6366f1;color:#818cf8;background:rgba(99,102,241,.06)}
.del-btn{width:34px;height:34px;border-radius:10px;border:1px solid rgba(255,255,255,.06);background:transparent;color:#475569;cursor:pointer;font-size:14px;display:inline-flex;align-items:center;justify-content:center;font-family:inherit}
.del-btn:active{border-color:#ef4444;color:#ef4444}
.reset-btn{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(239,68,68,.15);background:transparent;color:#64748b;font-size:13px;cursor:pointer;font-family:inherit;margin-top:12px}
.reset-btn:active{border-color:#ef4444;color:#ef4444}

/* Goal edit */
.gedit{display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap}
.ginput{width:80px;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#e2e8f0;font-size:13px;font-family:inherit;text-align:center;direction:ltr;outline:none;-webkit-appearance:none;transition:all .2s}
.ginput:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.glbl{font-size:11px;color:#475569}

.footer{text-align:center;margin-top:24px;color:#1e293b;font-size:10px;padding-bottom:20px}
.prog-dots{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.prog-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.08);transition:all .3s}
.prog-dot.done{background:#6366f1}
.prog-dot.cur{background:#818cf8;box-shadow:0 0 10px rgba(129,140,248,.5)}

/* Month badge */
.month-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;background:rgba(99,102,241,.1);color:#818cf8;font-size:11px;font-weight:600;margin-bottom:12px}

/* Upload zone */
.upload-zone{border:2px dashed rgba(99,102,241,.25);border-radius:16px;padding:28px 16px;text-align:center;cursor:pointer;transition:all .3s;background:rgba(99,102,241,.03);margin-bottom:14px}
.upload-zone:active,.upload-zone.drag{border-color:#6366f1;background:rgba(99,102,241,.08)}
.upload-zone .uz-icon{font-size:36px;margin-bottom:8px}
.upload-zone .uz-title{font-size:14px;color:#cbd5e1;font-weight:600;margin-bottom:4px}
.upload-zone .uz-sub{font-size:11px;color:#475569}
.upload-zone input{display:none}
.upload-types{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:10px}
.upload-type{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:8px;background:rgba(255,255,255,.04);font-size:10px;color:#64748b}

/* Parsed results */
.parsed-box{background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.12);border-radius:14px;padding:16px;margin-bottom:14px}
.parsed-box h4{font-size:13px;color:#34d399;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.parsed-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.parsed-row:last-child{border-bottom:none}
.parsed-label{font-size:12px;color:#94a3b8}
.parsed-val{font-size:14px;font-weight:600;font-variant-numeric:tabular-nums}
.parsed-val.pos{color:#34d399}.parsed-val.neg{color:#f87171}
.parsed-actions{display:flex;gap:8px;margin-top:14px}
.parsed-actions button{flex:1}

/* Receipt preview */
.receipt-preview{border-radius:12px;overflow:hidden;margin-bottom:14px;max-height:300px;position:relative}
.receipt-preview img{width:100%;height:auto;display:block;max-height:300px;object-fit:contain;background:rgba(255,255,255,.03)}
.receipt-overlay{position:absolute;bottom:0;left:0;right:0;padding:12px;background:linear-gradient(transparent,rgba(0,0,0,.8))}
.receipt-overlay span{font-size:11px;color:#94a3b8}

/* Transactions list */
.tx-list{max-height:300px;overflow-y:auto}
.tx-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.tx-item:last-child{border-bottom:none}
.tx-cat{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-desc{font-size:12px;color:#cbd5e1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-date{font-size:10px;color:#475569}
.tx-amt{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;flex-shrink:0}

.file-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:10px;background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.15);font-size:12px;color:#818cf8;margin-bottom:10px}
.file-chip .fc-x{cursor:pointer;opacity:.6;font-size:14px}
.file-chip .fc-x:hover{opacity:1}

@media(min-width:700px){.app{padding:24px 20px;padding-bottom:100px}.cgrid{grid-template-columns:1fr 1fr 1fr 1fr}.hdr h1{font-size:28px}.sc .val{font-size:26px}}
</style>
</head>
<body>
<div class="bg"></div>
<div class="app" id="app"><div style="text-align:center;padding:100px 20px;color:#64748b">טוען...</div></div>
<nav class="bnav" id="bnav"></nav>

<script>
(function(){
"use strict";

var MONTHS=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
var STORE_KEY="fin_v5";

/* ===== STATE ===== */
var state={
  setupDone:false,
  wizStep:0,
  profile:{salary:0,extraIncome:0,rent:0,bills:0,insurance:0,pension:0,loans:0,savingsGoal:0},
  goals:[],
  months:{}, // key="2026-01" => {income,fixed,shopping,savings,extra:{}}
  sel:null, // "2026-04"
  view:"dashboard"
};

function monthKey(y,m){return y+"-"+(m<10?"0":"")+m}
function monthLabel(key){var p=key.split("-");return MONTHS[parseInt(p[1],10)-1]+" "+p[0]}
function monthShort(key){var p=key.split("-");return MONTHS[parseInt(p[1],10)-1]}
function curMonthKey(){var d=new Date();return monthKey(d.getFullYear(),d.getMonth()+1)}
function getAllMonthKeys(){var keys=[];for(var k in state.months){keys.push(k)}keys.sort();return keys}
function fmt(v){return "\u20AA"+(v||0).toLocaleString("he-IL")}
function prs(s){var n=parseInt(String(s).replace(/[^0-9\-]/g,""),10);return isNaN(n)?0:n}

/* ===== PERSISTENCE ===== */
function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state))}catch(e){}}
function load(){
  try{
    var s=localStorage.getItem(STORE_KEY);
    if(s){var loaded=JSON.parse(s);for(var k in loaded){state[k]=loaded[k]}}
  }catch(e){}
}

/* ===== SETUP WIZARD ===== */
function renderWizard(){
  var step=state.wizStep;
  var totalSteps=4;
  var p=state.profile;
  var h='<div class="wiz-overlay"><div class="wiz-box">';

  // Progress dots
  h+='<div class="prog-dots">';
  for(var i=0;i<totalSteps;i++){
    h+='<div class="prog-dot'+(i<step?" done":"")+(i===step?" cur":"")+'"></div>';
  }
  h+='</div>';

  if(step===0){
    h+='<h2>👋 ברוך הבא!</h2>';
    h+='<div class="wiz-sub">בוא נגדיר את הפרופיל הפיננסי שלך<br>זה ייקח פחות מדקה</div>';
    h+='<button class="btn-primary" onclick="wizNext()">בוא נתחיל →</button>';

  }else if(step===1){
    h+='<h2>💵 הכנסות</h2>';
    h+='<div class="wiz-sub">כמה אתה מרוויח בחודש? אפשר גם להעלות קובץ</div>';
    // Upload zone in wizard
    h+='<div class="upload-zone" onclick="document.getElementById(\'wizFileInput\').click()" ondrop="handleWizDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" style="margin-bottom:18px;padding:18px 14px">';
    h+='<input type="file" id="wizFileInput" accept=".csv,.xlsx,.xls,.jpg,.jpeg,.png,.webp" onchange="handleWizFile(this)" style="display:none">';
    h+='<div class="uz-icon" style="font-size:28px">📎</div>';
    h+='<div class="uz-title" style="font-size:13px">העלה תלוש משכורת או דוח בנק</div>';
    h+='<div class="uz-sub">CSV, Excel, או תמונה</div></div>';
    if(window._wizParsed){
      h+='<div class="parsed-box" style="margin-bottom:16px"><h4>✅ זוהה מהקובץ</h4>';
      if(window._wizParsed.income>0)h+='<div class="parsed-row"><span class="parsed-label">💵 הכנסות</span><span class="parsed-val pos">'+fmt(window._wizParsed.income)+'</span></div>';
      if(window._wizParsed.expense>0)h+='<div class="parsed-row"><span class="parsed-label">🧾 הוצאות</span><span class="parsed-val neg">'+fmt(window._wizParsed.expense)+'</span></div>';
      h+='<div class="parsed-actions"><button class="btn-secondary" onclick="applyWizParsed()" style="font-size:13px">החל נתונים ✓</button></div></div>';
    }
    h+='<div class="wiz-fields">';
    h+='<div class="wiz-field"><label>💼 משכורת נטו</label><input id="w_salary" type="text" inputmode="numeric" value="'+(p.salary||"")+'" placeholder="0"></div>';
    h+='<div class="wiz-field"><label>💰 הכנסות נוספות</label><input id="w_extra" type="text" inputmode="numeric" value="'+(p.extraIncome||"")+'" placeholder="0"></div>';
    h+='</div>';
    h+='<button class="btn-primary" onclick="wizSaveIncome()">המשך →</button>';

  }else if(step===2){
    h+='<h2>🏠 הוצאות קבועות</h2>';
    h+='<div class="wiz-sub">הוצאות שחוזרות כל חודש — אפשר גם להעלות קובץ</div>';
    // Upload zone for expenses
    h+='<div class="upload-zone" onclick="document.getElementById(\'wizFileInput2\').click()" ondrop="handleWizDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" style="margin-bottom:18px;padding:18px 14px">';
    h+='<input type="file" id="wizFileInput2" accept=".csv,.xlsx,.xls,.jpg,.jpeg,.png,.webp" onchange="handleWizFile(this)" style="display:none">';
    h+='<div class="uz-icon" style="font-size:28px">📎</div>';

    h+='<div class="wiz-field"><label>🏦 פנסיה/גמל</label><input id="w_pension" type="text" inputmode="numeric" value="'+(p.pension||"")+'" placeholder="0"></div>';

    h+='<button class="btn-primary" onclick="wizSaveExpenses()">המשך →</button>';

  }else if(step===3){
    h+='<h2>🎯 יעדי חיסכון</h2>';
    h+='<div class="wiz-sub">כמה תרצה לחסוך בחודש?</div>';
    h+='<div class="wiz-fields">';
    h+='<div class="wiz-field"><label>🏦 חיסכון חודשי רצוי</label><input id="w_sav" type="text" inputmode="numeric" value="'+(p.savingsGoal||"")+'" placeholder="0"></div>';
    h+='</div>';
    var totalFixed=(p.rent||0)+(p.bills||0)+(p.insurance||0)+(p.pension||0)+(p.loans||0);
    var totalIncome=(p.salary||0)+(p.extraIncome||0);
    var freeAfter=totalIncome-totalFixed;
    h+='<div style="background:rgba(255,255,255,.03);border-radius:12px;padding:14px;margin-bottom:20px;text-align:center">';
    h+='<div style="font-size:11px;color:#64748b;margin-bottom:6px">לאחר הוצאות קבועות נשאר לך</div>';
    h+='<div style="font-size:24px;font-weight:700;color:'+(freeAfter>=0?"#34d399":"#f87171")+'">'+fmt(freeAfter)+'</div>';
    h+='</div>';

}

window.wizNext=function(){state.wizStep++;renderWizard()};
window.wizBack=function(){state.wizStep--;renderWizard()};
window.wizSaveIncome=function(){
  state.profile.salary=prs(document.getElementById("w_salary").value);
  state.profile.extraIncome=prs(document.getElementById("w_extra").value);
  state.wizStep++;save();renderWizard();
};
window.wizSaveExpenses=function(){
  state.profile.rent=prs(document.getElementById("w_rent").value);
  state.profile.bills=prs(document.getElementById("w_bills").value);
  state.profile.insurance=prs(document.getElementById("w_ins").value);
  state.profile.pension=prs(document.getElementById("w_pension").value);
  state.profile.loans=prs(document.getElementById("w_loans").value);
  state.wizStep++;save();renderWizard();
};
window.wizFinish=function(){
  state.profile.savingsGoal=prs(document.getElementById("w_sav").value);
  state.setupDone=true;
  if(!state.selYear)state.selYear=new Date().getFullYear();
  state.goals=[
    {name:"חיסכון שנתי",current:0,target:(state.profile.savingsGoal||0)*12,color:"#818cf8",icon:"🛡️"},
    {name:"קרן חירום",current:0,target:(state.profile.salary||0)*3,color:"#fbbf24",icon:"⚡"},
  ];
  // Create ALL 12 months for the current year
  createYearMonths(new Date().getFullYear());
  state.sel=curMonthKey();
  save();render();renderNav();
};

function createYearMonths(year){
  var p=state.profile;
  var totalFixed=(p.rent||0)+(p.bills||0)+(p.insurance||0)+(p.pension||0)+(p.loans||0);
  for(var m=1;m<=12;m++){
    var mk=monthKey(year,m);
    if(!state.months[mk]){
      state.months[mk]={
        income:(p.salary||0)+(p.extraIncome||0),
        fixed:totalFixed,
        shopping:0,
        savings:p.savingsGoal||0,
        detail:{rent:p.rent||0,bills:p.bills||0,insurance:p.insurance||0,pension:p.pension||0,loans:p.loans||0,extraIncome:p.extraIncome||0}
      };
    }
  }
}

function getYears(){
  var years={};
  for(var k in state.months){var y=parseInt(k.split("-")[0],10);years[y]=true}
  var arr=[];for(var yy in years){arr.push(parseInt(yy,10))}
  arr.sort();return arr;
}

function getMonthKeysForYear(year){
  var keys=[];
  for(var m=1;m<=12;m++){
    var mk=monthKey(year,m);
    if(state.months[mk])keys.push(mk);
  }
  return keys;
}

window.setYear=function(y){
  state.selYear=y;
  // Make sure year months exist
  createYearMonths(y);
  state.sel=monthKey(y,1);
  save();render();
};

window.addNextYear=function(){
  var years=getYears();
  var maxY=years.length>0?years[years.length-1]:new Date().getFullYear();
  var nextY=maxY+1;
  createYearMonths(nextY);
  state.selYear=nextY;
  state.sel=monthKey(nextY,1);
  save();render();
};

/* ===== ADD MONTH (legacy compat) ===== */
window.addMonthPrompt=function(){addNextYear()};

window.delMonth=function(k){
  var keys=getAllMonthKeys();
  if(keys.length<=1)return;
  delete state.months[k];
  keys=getAllMonthKeys();
  state.sel=keys[keys.length-1];
  save();render();
};

/* ===== UPDATE DATA ===== */
window.updField=function(mk,field,val){
  if(!state.months[mk])return;
  state.months[mk][field]=prs(val);
  save();render();
};
window.updDetail=function(mk,field,val){
  if(!state.months[mk])return;
  if(!state.months[mk].detail)state.months[mk].detail={};
  state.months[mk].detail[field]=prs(val);
  // Recalc fixed
  var d=state.months[mk].detail;
  state.months[mk].fixed=(d.rent||0)+(d.bills||0)+(d.insurance||0)+(d.pension||0)+(d.loans||0);
  // Recalc income
  state.months[mk].income=(state.profile.salary||0)+(d.extraIncome||0);
  save();render();
};
window.updGoal=function(i,key,val){state.goals[i][key]=prs(val);save();render()};
window.addGoal=function(){
  var ic=["🎯","⭐","🏆","💰","🚀"];var co=["#34d399","#f472b6","#fb923c","#22d3ee","#a78bfa"];
  var x=state.goals.length;
  state.goals.push({name:"יעד חדש",current:0,target:10000,color:co[x%co.length],icon:ic[x%ic.length]});
  save();render();
};
window.selectMonth=function(k){state.sel=k;state.selYear=parseInt(k.split("-")[0],10);render();scrollToMonth()};
window.setView=function(v){state.view=v;render();renderNav();window.scrollTo(0,0)};
window.resetAll=function(){
  if(!confirm("למחוק את כל הנתונים ולהתחיל מחדש?"))return;
  try{localStorage.removeItem(STORE_KEY)}catch(e){}
  state={setupDone:false,wizStep:0,profile:{salary:0,extraIncome:0,rent:0,bills:0,insurance:0,pension:0,loans:0,savingsGoal:0},goals:[],months:{},sel:null,view:"dashboard"};
  renderWizard();
};

function scrollToMonth(){
  var el=document.getElementById("mt-"+state.sel);
  if(el)el.scrollIntoView({behavior:"smooth",inline:"center",block:"nearest"});
}

/* ===== NAV ===== */
function renderNav(){
  var tabs=[{id:"dashboard",icon:"📊",label:"סקירה"},{id:"update",icon:"📝",label:"עדכון חודשי"},{id:"goals",icon:"🎯",label:"יעדים"},{id:"settings",icon:"⚙️",label:"הגדרות"}];
  var h="";
  for(var i=0;i<tabs.length;i++){
    var t=tabs[i];
    h+='<button class="bni'+(state.view===t.id?' on':'')+'" onclick="setView(\''+t.id+'\')">';
    h+='<span class="bi">'+t.icon+'</span><span class="bl">'+t.label+'</span></button>';
  }
  document.getElementById("bnav").innerHTML=h;
}

/* ===== MAIN RENDER ===== */
function render(){
  if(!state.setupDone){renderWizard();return}

  var keys=getAllMonthKeys();
  if(!state.sel||!state.months[state.sel])state.sel=keys[keys.length-1];
  if(!state.selYear)state.selYear=parseInt((state.sel||curMonthKey()).split("-")[0],10);
  var mk=state.sel;
  var cur=state.months[mk];
  if(!cur)return;

  var totalExp=cur.fixed+cur.shopping;
  var balance=cur.income-totalExp-cur.savings;
  var prevKey=null;
  var idx=-1;
  for(var ki=0;ki<keys.length;ki++){if(keys[ki]===mk){idx=ki;break}}
  if(idx>0)prevKey=keys[idx-1];
  var prev=prevKey?state.months[prevKey]:null;
  var incDiff=prev?cur.income-prev.income:0;
  var expDiff=prev?totalExp-(prev.fixed+prev.shopping):0;

  var h="";

  // Header
  h+='<div class="hdr"><h1>💰 לוח בקרה פיננסי</h1>';
  h+='<div class="sub">'+monthLabel(mk)+' · נשמר אוטומטית</div></div>';

  // Year selector (dropdown) — auto includes 3 years ahead
  var years=getYears();
  var curYear=state.selYear||parseInt(mk.split("-")[0],10);
  var thisYear=new Date().getFullYear();
  var maxExisting=years.length>0?years[years.length-1]:thisYear;
  var maxYear=Math.max(maxExisting,thisYear)+3;
  var allYears=[];
  if(years.length>0){for(var ay=years[0];ay<=maxYear;ay++){allYears.push(ay)}}
  else{for(var ay2=thisYear;ay2<=maxYear;ay2++){allYears.push(ay2)}}
  h+='<div style="margin-bottom:12px">';
  h+='<select id="yearSel" onchange="setYear(parseInt(this.value,10))" style="width:100%;padding:12px 16px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(22,24,40,.95);color:#e2e8f0;font-size:16px;font-weight:600;font-family:inherit;outline:none;text-align:center;cursor:pointer;direction:ltr">';
  for(var yi=0;yi<allYears.length;yi++){
    h+='<option value="'+allYears[yi]+'"'+(allYears[yi]===curYear?" selected":"")+'>'+allYears[yi]+'</option>';
  }
  h+='</select></div>';

  // Month scroller — show all 12 for selected year
  var yearKeys=getMonthKeysForYear(curYear);
  h+='<div class="mscroll"><div class="mtabs">';
  for(var m=0;m<yearKeys.length;m++){
    h+='<button id="mt-'+yearKeys[m]+'" class="mt'+(yearKeys[m]===mk?' on':'')+'" onclick="selectMonth(\''+yearKeys[m]+'\')">'+monthShort(yearKeys[m])+'</button>';
  }
  h+='</div></div>';

  // ========== DASHBOARD VIEW ==========
  h+='<div class="'+(state.view!=="dashboard"?"hidden":"")+'">';

  // Cards

    {icon:"🧾",label:"הוצאות",value:totalExp,diff:expDiff,up:expDiff<=0,color:"#ef4444",hasDiff:true},
    {icon:"🏦",label:"חיסכון",value:cur.savings,color:"#818cf8",pct:cur.income>0?((cur.savings/cur.income)*100).toFixed(0):"0"},
    {icon:"💎",label:"יתרה",value:balance,color:"#f59e0b",isBal:true}
  ];
  h+='<div class="cgrid">';
  for(var c=0;c<cards.length;c++){
    var cd=cards[c];
    h+='<div class="sc"><div class="bar" style="background:linear-gradient(90deg,'+cd.color+',transparent)"></div>';
    h+='<div class="glow" style="background:'+cd.color+'"></div>';
    h+='<span class="ico">'+cd.icon+'</span><div class="lbl">'+cd.label+'</div>';
    h+='<div class="val">'+fmt(cd.value)+'</div>';
    if(cd.hasDiff&&prev)h+='<span class="trnd '+(cd.up?"tu":"td")+'">'+(cd.up?"▲":"▼")+" "+fmt(Math.abs(cd.diff))+"</span>";
    if(cd.pct!==undefined)h+='<span class="trnd tu">'+cd.pct+'% מההכנסה</span>';
    if(cd.isBal)h+='<span class="trnd '+(balance>=0?"tu":"td")+'">'+(balance>=0?"תקין ✓":"חריגה ✗")+"</span>";
    h+="</div>";
  }
  h+="</div>";

  // Chart
  h+='<div class="pnl"><h3>📊 מגמה</h3><div class="chwrap"><canvas id="lc"></canvas></div>';
  h+='<div class="leg"><span><span class="ldot" style="background:#10b981"></span> הכנסות</span>';
  h+='<span><span class="ldot" style="background:#ef4444"></span> הוצאות</span>';
  h+='<span><span class="ldot" style="background:#818cf8"></span> חיסכון</span></div></div>';

  // Expense breakdown
  h+='<div class="pnl"><h3>🧮 פירוט — '+monthShort(mk)+'</h3>';
  var det=cur.detail||{};
  var fixedItems=[
    {icon:"🏠",name:"שכירות/משכנתא",amount:det.rent||0,color:"#fbbf24",bg:"rgba(251,191,36,.1)"},
    {icon:"⚡",name:"חשבונות",amount:det.bills||0,color:"#fb923c",bg:"rgba(251,146,60,.1)"},
    {icon:"🛡️",name:"ביטוחים",amount:det.insurance||0,color:"#22d3ee",bg:"rgba(34,211,238,.1)"},

    {icon:"💳",name:"הלוואות",amount:det.loans||0,color:"#f472b6",bg:"rgba(244,114,182,.1)"},

  ];

    h+='<div class="ebar"><div class="efill" style="width:'+Math.min(parseFloat(ep),100)+'%;background:'+ex.color+'"></div></div></div>';

  var svP=cur.income>0?((cur.savings/cur.income)*100).toFixed(0):"0";

  h+='<div class="sbar"><div class="sfill" style="width:'+svP+'%"></div></div></div></div>';

    }

  h+='</div>'; // end dashboard

  // ========== UPDATE MONTHLY VIEW ==========

  h+='<div class="pnl">';
  h+='<h3>📝 עדכון חודשי — '+monthLabel(mk)+'</h3>';
  h+='<div class="month-badge">📅 '+monthLabel(mk)+'</div>';
  h+='</div>';

  // Upload section
  h+=renderUploadSection(mk);

  h+='<div class="pnl"><h3>✏️ עריכה ידנית</h3>';

  h+='<div style="margin-bottom:16px"><div style="font-size:12px;color:#94a3b8;font-weight:600;margin-bottom:10px">💵 הכנסות</div>';
  h+='<div class="ecard-grid">';
  h+='<div class="ecard-field"><span class="ecard-label">💼 משכורת</span><input class="einput inc" type="text" inputmode="numeric" value="'+((state.profile.salary||0)).toLocaleString()+'" onchange="updProfile(\'salary\',this.value)" onfocus="this.select()"></div>';
  h+='<div class="ecard-field"><span class="ecard-label">💰 נוספות</span><input class="einput inc" type="text" inputmode="numeric" value="'+((det.extraIncome||0)).toLocaleString()+'" onchange="updDetail(\''+mk+'\',\'extraIncome\',this.value)" onfocus="this.select()"></div>';

/* ===== FILE UPLOAD & PARSING ===== */
var parsedData=null; // temp holder for parsed file results
var receiptImg=null;

window.triggerUpload=function(){document.getElementById("fileInput").click()};

window.handleFile=function(input){
  var file=input.files[0];
  if(!file)return;
  var ext=file.name.split(".").pop().toLowerCase();

  if(ext==="csv"||ext==="txt"){
    parseCSV(file);
  }else if(ext==="xlsx"||ext==="xls"){
    parseExcel(file);
  }else if(ext==="jpg"||ext==="jpeg"||ext==="png"||ext==="webp"||ext==="heic"){
    handleImage(file);
  }else{
    alert("סוג קובץ לא נתמך. נסה CSV, Excel, או תמונה.");
  }
  input.value="";
};

function parseCSV(file){
  if(typeof Papa==="undefined"){alert("ספריית PapaParse לא נטענה. בדוק חיבור אינטרנט.");return}
  Papa.parse(file,{
    header:true,
    skipEmptyLines:true,
    encoding:"UTF-8",
    complete:function(results){
      if(!results.data||results.data.length===0){alert("לא נמצאו נתונים בקובץ");return}
      analyzeTransactions(results.data,file.name);
    },
    error:function(){alert("שגיאה בקריאת הקובץ")}
  });
}

function parseExcel(file){
  if(typeof XLSX==="undefined"){alert("ספריית SheetJS לא נטענה. בדוק חיבור אינטרנט.");return}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:"array"});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var data=XLSX.utils.sheet_to_json(ws,{defval:""});
      if(!data||data.length===0){alert("לא נמצאו נתונים בקובץ");return}
      analyzeTransactions(data,file.name);
    }catch(err){alert("שגיאה בקריאת הקובץ: "+err.message)}
  };
  reader.readAsArrayBuffer(file);
}

function analyzeTransactions(rows,fileName){
  // Try to detect columns: date, description, amount, credit, debit
  var cols=Object.keys(rows[0]);
  var dateCol=null,descCol=null,amountCol=null,creditCol=null,debitCol=null;

  for(var i=0;i<cols.length;i++){
    var cl=cols[i].toLowerCase().trim();
    if(!dateCol&&(cl.indexOf("date")>-1||cl.indexOf("תאריך")>-1||cl.indexOf("תאריך ערך")>-1))dateCol=cols[i];
    if(!descCol&&(cl.indexOf("desc")>-1||cl.indexOf("תיאור")>-1||cl.indexOf("פרטים")>-1||cl.indexOf("שם")>-1||cl.indexOf("description")>-1||cl.indexOf("פירוט")>-1))descCol=cols[i];
    if(!amountCol&&(cl.indexOf("amount")>-1||cl.indexOf("סכום")>-1||cl.indexOf("סך")>-1))amountCol=cols[i];
    if(!creditCol&&(cl.indexOf("credit")>-1||cl.indexOf("זכות")>-1))creditCol=cols[i];
    if(!debitCol&&(cl.indexOf("debit")>-1||cl.indexOf("חובה")>-1||cl.indexOf("חיוב")>-1))debitCol=cols[i];
  }

  // Fallback: use first few columns
  if(!descCol&&cols.length>1)descCol=cols[1];
  if(!amountCol&&!creditCol&&cols.length>2)amountCol=cols[cols.length-1];

  var transactions=[];
  var totalIncome=0,totalExpense=0;

  for(var r=0;r<rows.length;r++){
    var row=rows[r];
    var desc=descCol?String(row[descCol]||"").trim():"שורה "+(r+1);
    var date=dateCol?String(row[dateCol]||"").trim():"";
    var amount=0;

    if(creditCol&&debitCol){
      var cr=parseFloat(String(row[creditCol]||"0").replace(/[^0-9.\-]/g,""))||0;
      var db=parseFloat(String(row[debitCol]||"0").replace(/[^0-9.\-]/g,""))||0;
      amount=cr-db;
    }else if(amountCol){
      amount=parseFloat(String(row[amountCol]||"0").replace(/[^0-9.\-]/g,""))||0;
    }

    if(amount===0&&!desc)continue;

    var cat=categorize(desc);
    transactions.push({desc:desc,date:date,amount:amount,cat:cat});
    if(amount>0)totalIncome+=amount;
    else totalExpense+=Math.abs(amount);
  }

  parsedData={
    fileName:fileName,
    transactions:transactions,
    totalIncome:totalIncome,
    totalExpense:totalExpense,
    summary:summarizeByCategory(transactions)
  };
  render();
}

function categorize(desc){
  var d=(desc||"").toLowerCase();
  if(d.indexOf("שכר")>-1||d.indexOf("משכורת")>-1||d.indexOf("salary")>-1)return{icon:"💼",name:"משכורת",type:"income"};
  if(d.indexOf("שכירות")>-1||d.indexOf("rent")>-1||d.indexOf("משכנתא")>-1)return{icon:"🏠",name:"דיור",type:"fixed"};
  if(d.indexOf("חשמל")>-1||d.indexOf("מים")>-1||d.indexOf("גז")>-1||d.indexOf("ארנונה")>-1||d.indexOf("electric")>-1)return{icon:"⚡",name:"חשבונות",type:"fixed"};
  if(d.indexOf("ביטוח")>-1||d.indexOf("insurance")>-1)return{icon:"🛡️",name:"ביטוח",type:"fixed"};
  if(d.indexOf("פנסי")>-1||d.indexOf("pension")>-1||d.indexOf("גמל")>-1)return{icon:"🏦",name:"פנסיה",type:"fixed"};
  if(d.indexOf("הלוואה")>-1||d.indexOf("loan")>-1||d.indexOf("אשראי")>-1)return{icon:"💳",name:"הלוואות",type:"fixed"};
  if(d.indexOf("סופר")>-1||d.indexOf("רמי לוי")>-1||d.indexOf("שופרסל")>-1||d.indexOf("מסעדה")>-1||d.indexOf("קפה")>-1||d.indexOf("food")>-1||d.indexOf("אוכל")>-1)return{icon:"🛒",name:"קניות ואוכל",type:"shopping"};
  if(d.indexOf("דלק")>-1||d.indexOf("רכב")>-1||d.indexOf("חניה")>-1)return{icon:"🚗",name:"תחבורה",type:"shopping"};
  if(d.indexOf("העברה")>-1||d.indexOf("transfer")>-1)return{icon:"🔄",name:"העברה",type:"other"};
  if(d.indexOf("חיסכון")>-1||d.indexOf("saving")>-1||d.indexOf("פקדון")>-1)return{icon:"💎",name:"חיסכון",type:"savings"};
  return{icon:"📋",name:"אחר",type:"shopping"};
}

function summarizeByCategory(txs){
  var cats={};
  for(var i=0;i<txs.length;i++){
    var t=txs[i];
    var key=t.cat.name;
    if(!cats[key])cats[key]={icon:t.cat.icon,type:t.cat.type,total:0,count:0};
    cats[key].total+=t.amount;
    cats[key].count++;
  }
  return cats;
}

function handleImage(file){
  var reader=new FileReader();
  reader.onload=function(e){
    receiptImg={name:file.name,src:e.target.result};

}

window.applyParsedData=function(){
  if(!parsedData)return;
  var mk=state.sel;
  if(!state.months[mk])return;
  var s=parsedData.summary;

  // Apply income
  var incomeTotal=0;
  for(var k in s){if(s[k].total>0)incomeTotal+=s[k].total}
  if(incomeTotal>0)state.months[mk].income=Math.round(incomeTotal);

  // Apply expenses by category
  var det=state.months[mk].detail||{};
  for(var k in s){
    var c=s[k];
    var absVal=Math.round(Math.abs(c.total));
    if(c.type==="fixed"){
      if(k==="דיור")det.rent=absVal;
      else if(k==="חשבונות")det.bills=absVal;
      else if(k==="ביטוח")det.insurance=absVal;
      else if(k==="פנסיה")det.pension=absVal;
      else if(k==="הלוואות")det.loans=absVal;
    }else if(c.type==="shopping"&&c.total<0){
      state.months[mk].shopping=(state.months[mk].shopping||0)+absVal;
    }else if(c.type==="savings"){
      state.months[mk].savings=absVal;
    }
  }
  // Recalc fixed
  state.months[mk].detail=det;
  state.months[mk].fixed=(det.rent||0)+(det.bills||0)+(det.insurance||0)+(det.pension||0)+(det.loans||0);

  parsedData=null;
  receiptImg=null;
  save();render();
};

window.handleWizFile=function(input){
  var file=input.files[0];

  if(ext==="csv"||ext==="txt"){

      wizAnalyze(results.data,file.name);
    }});
  }else if(ext==="xlsx"||ext==="xls"){
    if(typeof XLSX==="undefined"){alert("ספריית SheetJS לא נטענה");return}
    var reader=new FileReader();
    reader.onload=function(e){
      try{var wb=XLSX.read(e.target.result,{type:"array"});var ws=wb.Sheets[wb.SheetNames[0]];var data=XLSX.utils.sheet_to_json(ws,{defval:""});
      if(!data||data.length===0){alert("לא נמצאו נתונים");return}
      wizAnalyze(data,file.name)}catch(err){alert("שגיאה: "+err.message)}
    };reader.readAsArrayBuffer(file);
  }else if(ext==="jpg"||ext==="jpeg"||ext==="png"||ext==="webp"||ext==="heic"){
    window._wizParsed={income:0,expense:0,summary:{},isImage:true,fileName:file.name};

};

function wizAnalyze(rows,fileName){
  var cols=Object.keys(rows[0]);
  var descCol=null,amountCol=null,creditCol=null,debitCol=null;
  for(var i=0;i<cols.length;i++){
    var cl=cols[i].toLowerCase().trim();
    if(!descCol&&(cl.indexOf("desc")>-1||cl.indexOf("תיאור")>-1||cl.indexOf("פרטים")>-1||cl.indexOf("שם")>-1||cl.indexOf("פירוט")>-1))descCol=cols[i];
    if(!amountCol&&(cl.indexOf("amount")>-1||cl.indexOf("סכום")>-1||cl.indexOf("סך")>-1))amountCol=cols[i];
    if(!creditCol&&(cl.indexOf("credit")>-1||cl.indexOf("זכות")>-1))creditCol=cols[i];
    if(!debitCol&&(cl.indexOf("debit")>-1||cl.indexOf("חובה")>-1||cl.indexOf("חיוב")>-1))debitCol=cols[i];
  }
  if(!descCol&&cols.length>1)descCol=cols[1];
  if(!amountCol&&!creditCol&&cols.length>2)amountCol=cols[cols.length-1];

  var totalIncome=0,totalExpense=0;
  var transactions=[];
  for(var r=0;r<rows.length;r++){
    var row=rows[r];var desc=descCol?String(row[descCol]||"").trim():"";var amount=0;
    if(creditCol&&debitCol){var cr=parseFloat(String(row[creditCol]||"0").replace(/[^0-9.\-]/g,""))||0;var db=parseFloat(String(row[debitCol]||"0").replace(/[^0-9.\-]/g,""))||0;amount=cr-db}
    else if(amountCol){amount=parseFloat(String(row[amountCol]||"0").replace(/[^0-9.\-]/g,""))||0}
    if(amount===0&&!desc)continue;
    var cat=categorize(desc);transactions.push({desc:desc,amount:amount,cat:cat});
    if(amount>0)totalIncome+=amount;else totalExpense+=Math.abs(amount);
  }
  window._wizParsed={income:Math.round(totalIncome),expense:Math.round(totalExpense),summary:summarizeByCategory(transactions),fileName:fileName};
  renderWizard();
}

    var c=s[k];var absVal=Math.round(Math.abs(c.total));
    if(c.type==="fixed"){
      if(k==="דיור")p.rent=absVal;
      else if(k==="חשבונות")p.bills=absVal;
      else if(k==="ביטוח")p.insurance=absVal;
      else if(k==="פנסיה")p.pension=absVal;
      else if(k==="הלוואות")p.loans=absVal;
    }
  }
  window._wizParsed=null;save();renderWizard();
};

/* ===== BOOT ===== */
function safeBoot(){
  try{
    load();
  }catch(e){
    state={setupDone:false,wizStep:0,profile:{salary:0,extraIncome:0,rent:0,bills:0,insurance:0,pension:0,loans:0,savingsGoal:0},goals:[],months:{},sel:null,view:"dashboard"};
    try{localStorage.removeItem(STORE_KEY)}catch(x){}
  }
  try{
    if(state.setupDone){render();renderNav()}
    else{renderWizard()}
  }catch(e){
    document.getElementById("app").innerHTML='<div style="text-align:center;padding:60px 20px"><h2 style="color:#f87171;font-size:20px">שגיאה בטעינה</h2><p style="color:#94a3b8;margin:12px 0;font-size:13px">'+String(e.message||e)+'</p><button onclick="try{localStorage.removeItem(\'fin_v5\')}catch(x){}location.reload()" style="padding:12px 24px;border-radius:12px;border:none;background:#6366f1;color:#fff;font-size:16px;cursor:pointer;font-family:inherit;margin-top:12px">איפוס והפעלה מחדש</button></div>';
  }
}

// Boot IMMEDIATELY — don't wait for any CDN
safeBoot();

// Load Chart.js in background, re-render chart when ready
(function(){
  if(typeof Chart!=="undefined")return;
  try{
    var s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js";
    s.onload=function(){try{if(state.setupDone&&state.view==="dashboard")initChart()}catch(e){}};
    document.head.appendChild(s);
  }catch(e){}
})()

})();
</script>
